name: NotchMind
options:
  bundleIdPrefix: com.notchmind
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  NotchMind:
    type: application
    platform: macOS
    sources:
      - path: src
        type: group
      - path: resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchmind.app
        PRODUCT_NAME: NotchMind
        INFOPLIST_FILE: resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: resources/NotchMind.entitlements
    info:
      path: resources/Info.plist
      properties:
        CFBundleName: NotchMind
        CFBundleDisplayName: NotchMind
        CFBundleIdentifier: com.notchmind.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: NotchMind
        LSMinimumSystemVersion: "12.0"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSPrincipalClass: NSApplication
        NSMainStoryboardFile: ""
        LSUIElement: false
        NSHumanReadableCopyright: "Copyright © 2024 NotchMind. All rights reserved."
    entitlements:
      path: resources/NotchMind.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true

  NotchMindTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tests
        type: group
    dependencies:
      - target: NotchMind
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchmind.tests
        INFOPLIST_FILE: tests/Info.plist

schemes:
  NotchMind:
    build:
      targets:
        NotchMind: all
        NotchMindTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NotchMindTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release