name: NotchMind

options:
  bundleIdPrefix: com.notchmind
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "14.3"
  createIntermediateGroups: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_STYLE: Automatic
    EXCLUDED_ARCHS[sdk=macosx*]: x86_64
    ONLY_ACTIVE_ARCH: YES

targets:
  NotchMind:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/ModuleInterfaceOptimizer.swift"
          - "**/KeyboardShortcutManager.swift.bak"
          - "**/ModuleInterfaceOptimizer.swift.bak2"
          - "**/ClaudeCodeAgent.swift"
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchmind.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/NotchMind.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
        PRODUCT_NAME: NotchMind

schemes:
  NotchMind:
    build:
      targets:
        NotchMind: all
    run:
      config: Debug
    archive:
      config: Release