name: NotchMind
options:
  bundleIdPrefix: com.notchmind
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  NotchMind:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchmind.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/NotchMind.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
        PRODUCT_NAME: NotchMind
    entitlements:
      path: Resources/NotchMind.entitlements

  NotchMindTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: NotchMind
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchmind.app.tests
        INFOPLIST_FILE: Tests/Info.plist
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/NotchMind.app/Contents/MacOS/NotchMind
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  NotchMind:
    build:
      targets:
        NotchMind: all
        NotchMindTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NotchMindTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release