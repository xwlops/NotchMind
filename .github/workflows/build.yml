name: Build NotchMind

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd NotchMind
          xcodegen generate

      - name: Build NotchMind
        run: |
          cd NotchMind
          xcodebuild -project NotchMind.xcodeproj -scheme NotchMind -configuration Release -destination 'platform=macOS' build

      - name: Create DMG
        run: |
          brew install create-dmg
          # Find the built app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "NotchMind.app" -type d 2>/dev/null | head -1)
          echo "Found app at: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            create-dmg --volname "NotchMind" "NotchMind-${{ github.sha }}.dmg" "$APP_PATH"
            ls -la *.dmg
          else
            echo "ERROR: App not found"
            exit 1
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: NotchMind-DMG
          path: NotchMind/*.dmg
