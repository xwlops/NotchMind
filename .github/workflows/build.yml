name: Build NotchMind

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    env:
      DIST_DIR: ${{ github.workspace }}/dist
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd NotchMind
          xcodegen generate

      - name: Downgrade project format for Xcode 15.4
        run: |
          cd NotchMind
          perl -0pi -e 's/objectVersion = 77;/objectVersion = 60;/' NotchMind.xcodeproj/project.pbxproj
          grep -n "objectVersion" NotchMind.xcodeproj/project.pbxproj

      - name: Build NotchMind
        run: |
          cd NotchMind
          xcodebuild -project NotchMind.xcodeproj -scheme NotchMind -configuration Release -destination 'platform=macOS' build

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p "$DIST_DIR"
          # Find the built app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "NotchMind.app" -type d 2>/dev/null | head -1)
          echo "Found app at: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            create-dmg --volname "NotchMind" "$DIST_DIR/NotchMind-${{ github.sha }}.dmg" "$APP_PATH"
            ls -la "$DIST_DIR"
          else
            echo "ERROR: App not found"
            exit 1
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: NotchMind-DMG
          path: dist/*.dmg

      - name: Publish DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
